{% for post in posts %}    
            <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-ink-light/50 hover:border-ink-accent transition group">
              <div class="h-48 bg-gradient-to-br from-ink-accent/20 to-ink-light flex items-center justify-center">
                <span class="text-7xl opacity-30">✍️</span>
              </div>
              <div class="p-6">
                <h3 class="text-xl font-semibold mb-2 group-hover:text-ink-accent">
                  <a href="{{ post.get_absolute_url }}">{{ post.title }}</a>
                </h3>
                <p class="text-ink-gray text-sm mb-4 line-clamp-3">
                  {{ post.summary }}
                </p>
                <div class="flex justify-between text-xs text-ink-gray mt-4">
                  <span>@{{ post.author.pen_name }} • 1w ago</span>
                  <span>3.4k views</span>
                </div>
              </div>
            </div>
{% endfor %}
